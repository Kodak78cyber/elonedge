services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: vaultflow
      POSTGRES_USER: vaultflow
      POSTGRES_PASSWORD: vaultflow
    ports:
      - "5432:5432"
    volumes:
      - vaultflow_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaultflow -d vaultflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://vaultflow:vaultflow@db:5432/vaultflow?schema=public
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-please-change-me}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_NAME: VaultFlow
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    command: sh -c "npx prisma migrate deploy && node server.js"

volumes:
  vaultflow_pg:
